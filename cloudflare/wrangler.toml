name = "kidvibers"
main = "src/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
account_id = "3021aff7dc59bb05483ada6d03b99ad7"

routes = [
  { pattern = "kidvibers.com", custom_domain = true },
  { pattern = "www.kidvibers.com", custom_domain = true },
]

# Daily re-engagement: nudge parents of kids who've gone quiet (runs 16:00 UTC ~ 11am ET).
[triggers]
crons = ["0 16 * * *"]

# Error monitoring: keep logs (incl. unhandled errors) queryable in the Cloudflare dashboard
# under Workers → kidvibers → Logs. Pairs with the in-code 500-alert email.
[observability]
enabled = true

[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before serving static files so the www->apex 301 redirect fires on every
# request (otherwise Cloudflare serves assets before the Worker and the redirect is skipped).
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "kidvibers"
database_id = "195abd8a-85e7-4740-b127-31bab6cc499e"

# ── Staging: a private, password-protected copy with its own database ──
# Deploy with:  wrangler deploy --env staging
# The STAGING_USER var turns on the username/password gate; STAGING_PASS is a secret.
[env.staging]
name = "kidvibers-staging"
vars = { STAGING_USER = "preview" }
# IMPORTANT: empty so staging never claims the kidvibers.com custom domain (otherwise it
# inherits the top-level routes and hijacks the live site). Staging stays on workers.dev.
routes = []
workers_dev = true

[env.staging.assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before serving any page, so the password gate covers the WHOLE site.
run_worker_first = true

[[env.staging.d1_databases]]
binding = "DB"
database_name = "kidvibers-staging"
database_id = "64beba15-b273-4ed9-8671-b6b830ea3c61"

# Production DB, bound to staging only, so the "Publish to live" button can push edits.
[[env.staging.d1_databases]]
binding = "DB_PROD"
database_name = "kidvibers"
database_id = "195abd8a-85e7-4740-b127-31bab6cc499e"
