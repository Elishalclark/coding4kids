<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Coder Card - KidVibers</title>
  <meta property="og:title" content="Check out my KidVibers Coder Card! 🚀" />
  <meta property="og:description" content="See how much coding I've learned on KidVibers." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=128" />
  <style>
    body { background: #07050f; display: flex; flex-direction: column; min-height: 100vh; }
    .kc-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px 18px; }
    .kc { max-width: 420px; width: 100%; background: linear-gradient(160deg, #1e1040, #2a1145);
      border: 2px solid var(--border-bright); border-radius: 24px; padding: 34px 28px; text-align: center;
      box-shadow: 0 20px 70px rgba(124,58,237,0.35); }
    .kc-badge { display:inline-block; background:rgba(255,255,255,0.12); color:#c4b5fd; font-weight:900;
      font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; padding:5px 14px; border-radius:50px; margin-bottom:16px; }
    .kc-av { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#db2777);
      display:flex; align-items:center; justify-content:center; font-size:2.6rem; margin:0 auto 16px; box-shadow:0 0 40px rgba(124,58,237,0.6); }
    .kc h1 { font-size:1.7rem; font-weight:900; color:#fff; }
    .kc .sub { color:#a78bfa; font-weight:700; margin-top:4px; margin-bottom:22px; }
    .kc-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .kc-stat { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:16px 12px; }
    .kc-stat .n { font-size:1.8rem; font-weight:900; color:#fbbf24; line-height:1; }
    .kc-stat .l { font-size:0.72rem; color:#c4b5fd; font-weight:800; text-transform:uppercase; letter-spacing:0.04em; margin-top:5px; }
    .kc-cta { margin-top:24px; }
    .kc-foot { text-align:center; color:#6f6890; font-size:0.8rem; padding:18px; }
    .loading, .err { color:#a78bfa; text-align:center; font-weight:700; padding:40px; }
  </style>
</head>
<body>
  <div class="kc-wrap">
    <div id="card"><div class="loading">Loading coder card…</div></div>
  </div>
  <div class="kc-foot">🚀 Made on <a href="index.html" style="color:#a78bfa;font-weight:800;">KidVibers.com</a> — the fun way to learn coding</div>

  <script src="auth.js?v=128"></script>
  <script>
    (async () => {
      const t = new URLSearchParams(location.search).get('t');
      const card = document.getElementById('card');
      if (!t) { card.innerHTML = '<div class="err">No card link.</div>'; return; }
      let data;
      try { const r = await fetch('/api/kidcard/' + encodeURIComponent(t)); data = await r.json(); if (!r.ok) throw 0; }
      catch { card.innerHTML = '<div class="err">Card not found. 🤷</div>'; return; }
      const initial = (data.name || 'C').trim().charAt(0).toUpperCase();
      card.innerHTML = `
        <div class="kc">
          <div class="kc-badge">🏆 KidVibers Coder Card</div>
          <div class="kc-av">${initial}</div>
          <h1>${C4K.esc(data.name)}</h1>
          <div class="sub">Level ${data.level} Coder</div>
          <div class="kc-stats">
            <div class="kc-stat"><div class="n">${data.xp}</div><div class="l">Total XP ⚡</div></div>
            <div class="kc-stat"><div class="n">${data.lessonsDone}</div><div class="l">Lessons 📚</div></div>
            <div class="kc-stat"><div class="n">${data.worldsCleared}</div><div class="l">Worlds 🌍</div></div>
            <div class="kc-stat"><div class="n">${data.level}</div><div class="l">Level 🚀</div></div>
          </div>
          <div class="kc-cta">
            <a href="index.html" class="btn btn-primary btn-lg" style="width:100%;">Start coding too! 🚀</a>
          </div>
        </div>`;
    })();
  </script>
</body>
</html>
