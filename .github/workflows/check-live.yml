name: Check live page (diagnostic)

on:
  push:
    branches: [claude/kids-info-restore-ifooan]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Headers for /admin (following redirects)
        run: |
          echo "================ HEADERS (/admin) ================"
          curl -sSL -D - -o /dev/null "https://kidvibers.com/admin"

      - name: Is the new admin page deployed?
        run: |
          BODY=$(curl -sSL "https://kidvibers.com/admin")
          echo "================ MARKERS (/admin) ================"
          echo "dbStatus element present:        $(printf '%s' "$BODY" | grep -c 'id=\"dbStatus\"')"
          echo "renderDbStatus function present: $(printf '%s' "$BODY" | grep -c 'renderDbStatus')"
          echo "'Connected to production' text:  $(printf '%s' "$BODY" | grep -c 'Connected to production')"
          echo "stop-blank guard present:        $(printf '%s' "$BODY" | grep -c 'load in isolation')"
          echo "auth.js version tag:             $(printf '%s' "$BODY" | grep -o 'auth.js?v=[0-9]*' | head -1)"
          echo "total bytes:                     $(printf '%s' "$BODY" | wc -c)"
