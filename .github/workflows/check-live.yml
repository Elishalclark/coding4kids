name: Check live page (diagnostic)

on:
  push:
    branches: [claude/kids-info-restore-ifooan]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: What does the live homepage say for the child's email field?
        run: |
          BODY=$(curl -sSL "https://kidvibers.com/?nocache=$RANDOM")
          echo "=============================================="
          echo "suKidEmail field on the LIVE homepage:"
          printf '%s' "$BODY" | grep -o '<input[^>]*id="suKidEmail"[^>]*>'
          echo "----------------------------------------------"
          echo "contains '(optional)': $(printf '%s' "$BODY" | grep -c 'Child.s email (optional)')"
          echo "contains 'required':   $(printf '%s' "$BODY" | grep -c 'id="suKidEmail"[^>]*required')"
          echo "=============================================="
