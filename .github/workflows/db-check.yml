name: Read production database (diagnostic)

# Deploys the worker (which carries a temporary read-only counts endpoint) and reads
# the live production database THROUGH the worker's own DB binding — counts only, no PII.

on:
  push:
    branches: [claude/kids-info-restore-ifooan]
  workflow_dispatch: {}

jobs:
  db-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Build public/ assets
        run: |
          mkdir -p public
          cp ../*.html public/ 2>/dev/null || true
          cp ../app.js ../auth.js ../lessons.js ../editor.js ../pwa.js ../sw.js ../styles.css public/ 2>/dev/null || true
          cp ../manifest.json ../robots.txt ../sitemap.xml public/ 2>/dev/null || true
          rm -f public/data.db public/admin_config.json public/server.py public/test_email.py 2>/dev/null || true

      - name: Deploy worker (carries temp diag endpoint)
        run: npx wrangler@4 deploy

      - name: Read live database counts
        run: |
          echo "Waiting for the deploy to propagate..."
          sleep 8
          echo "================ PRODUCTION DATABASE COUNTS ================"
          curl -s "https://kidvibers.com/api/_diag_counts?k=d1ag9f3kQ7zR2mXpL8vT6wN4bY0cH5sJ"
          echo ""
          echo "==========================================================="
