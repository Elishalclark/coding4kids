name: Read production database (diagnostic)

# Read-only check of the live Cloudflare D1 database. Runs automatically when this
# file is pushed to the diagnostic branch. Only SELECT queries — never writes/deletes.

on:
  push:
    branches: [claude/kids-info-restore-ifooan]
  workflow_dispatch: {}

jobs:
  db-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Count users by role
        run: npx wrangler@4 d1 execute kidvibers --remote --command "SELECT role, COUNT(*) AS count FROM users GROUP BY role ORDER BY count DESC"

      - name: Total counts
        if: always()
        run: npx wrangler@4 d1 execute kidvibers --remote --command "SELECT (SELECT COUNT(*) FROM users) AS total_users, (SELECT COUNT(*) FROM users WHERE role='kid') AS kids, (SELECT COUNT(*) FROM progress) AS lessons_done, (SELECT COUNT(*) FROM sessions) AS active_sessions"

      - name: Newest 15 accounts
        if: always()
        run: npx wrangler@4 d1 execute kidvibers --remote --command "SELECT id, name, username, role, plan, substr(created_at,1,10) AS joined FROM users ORDER BY id DESC LIMIT 15"
