name: Test contact-form CC (diagnostic)

on:
  push:
    branches: [claude/kids-info-restore-ifooan]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Build public/ assets
        run: |
          mkdir -p public
          cp ../*.html public/ 2>/dev/null || true
          cp ../app.js ../auth.js ../lessons.js ../editor.js ../pwa.js ../sw.js ../styles.css public/ 2>/dev/null || true
          cp ../manifest.json ../robots.txt ../sitemap.xml public/ 2>/dev/null || true
          rm -f public/data.db public/admin_config.json public/server.py public/test_email.py 2>/dev/null || true

      - name: Deploy worker
        run: npx wrangler@4 deploy

      - name: Submit a test contact-form message
        run: |
          echo "Waiting for deploy to propagate..."
          sleep 12
          echo "================ CONTACT-FORM TEST ================"
          curl -s -X POST "https://kidvibers.com/api/contact" \
            -H "Content-Type: application/json" \
            -d '{"name":"CC Test","email":"cc-test@example.com","message":"Testing the support CC — this message should be CC-copied to elishalclark@icloud.com and kjdennis2@icloud.com."}'
          echo ""
          echo "=================================================="
