<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Handout - KidVibers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', Arial, sans-serif; background: #f3f4f6; padding: 24px; }

    .sheet { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

    .handout {
      background: #fff;
      border: 2px solid #7c3aed;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .h-header {
      background: linear-gradient(135deg, #2e1457, #4c1d95, #6d28d9);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .h-logo { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .h-logo span { color: #c4b5fd; }
    .h-tagline { color: #e0d4ff; font-size: 0.9rem; font-weight: 700; margin-left: auto; text-align: right; }

    .h-body { padding: 22px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

    .h-intro h2 { font-size: 1.25rem; font-weight: 900; color: #1e1040; margin-bottom: 8px; }
    .h-intro p { color: #444; font-size: 0.88rem; line-height: 1.6; }

    .h-steps { background: #faf5ff; border-radius: 12px; padding: 16px 18px; }
    .h-steps h3 { font-size: 0.88rem; font-weight: 900; color: #6d28d9; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .step:last-child { margin-bottom: 0; }
    .step-n { background: #7c3aed; color: #fff; width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; flex-shrink: 0; margin-top: 1px; }
    .step p { font-size: 0.84rem; color: #333; line-height: 1.4; }
    .step strong { color: #6d28d9; }

    .h-features { grid-column: span 2; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .feat { background: #f9f7ff; border: 1px solid #e9d5ff; border-radius: 10px; padding: 12px; text-align: center; }
    .feat .ico { font-size: 1.4rem; margin-bottom: 5px; }
    .feat .ft { font-size: 0.76rem; font-weight: 800; color: #4c1d95; }
    .feat .fd { font-size: 0.7rem; color: #6b7280; margin-top: 2px; }

    .h-qr { grid-column: span 2; display: flex; align-items: center; gap: 20px;
      background: #1e1040; border-radius: 12px; padding: 16px 22px; }
    .qr-box { background: #fff; padding: 8px; border-radius: 8px; flex-shrink: 0; }
    .qr-box img { display: block; width: 90px; height: 90px; }
    .h-qr .qr-text h3 { color: #fff; font-size: 1rem; font-weight: 900; margin-bottom: 4px; }
    .h-qr .qr-text p { color: #c4b5fd; font-size: 0.82rem; line-height: 1.5; }
    .h-qr .url { color: #fbbf24; font-weight: 900; font-size: 1rem; margin-top: 6px; }

    .h-footer { background: #f9f7ff; padding: 12px 28px; display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #e9d5ff; font-size: 0.75rem; color: #6b7280; }
    .h-footer strong { color: #6d28d9; }

    .print-btn { text-align: center; margin-bottom: 8px; }
    .print-btn button { background: #7c3aed; color: #fff; border: none; border-radius: 50px;
      padding: 11px 28px; font-weight: 900; font-size: 0.95rem; cursor: pointer; font-family: inherit; }

    @media print {
      body { background: #fff; padding: 0; }
      .print-btn { display: none; }
      .sheet { gap: 28px; }
      .handout { box-shadow: none; page-break-inside: avoid; }
    }
    @page { size: letter portrait; margin: 0.5in; }
  </style>
</head>
<body>

  <div class="print-btn">
    <button onclick="window.print()">🖨️ Print this page</button>
  </div>

  <div class="sheet" id="sheet">
    <!-- Card will be duplicated by JS -->
  </div>

  <script>
    const CODE = new URLSearchParams(location.search).get('code') || 'LIBRARY';

    const card = `
    <div class="handout">
      <div class="h-header">
        <div class="h-logo">🚀 Kid<span>Vibers</span></div>
        <div class="h-tagline">Learn to code.<br>Level up your life.</div>
      </div>
      <div class="h-body">
        <div class="h-intro">
          <h2>Your child just tried coding — keep it going at home! 🎉</h2>
          <p>KidVibers teaches kids ages 6–16 to code through <strong>293 fun lessons</strong>,
          arcade games, and boss battles across 25 themed worlds.
          It's free to start — no credit card, no ads, completely safe.</p>
          <div style="margin-top:12px;padding:10px 14px;background:#faf5ff;border-radius:10px;border-left:3px solid #7c3aed;">
            <div style="font-weight:900;font-size:0.82rem;color:#6d28d9;">🎁 Class code for this session:</div>
            <div style="font-size:1.4rem;font-weight:900;color:#1e1040;letter-spacing:3px;margin-top:3px;">${CODE}</div>
            <div style="font-size:0.74rem;color:#6b7280;margin-top:2px;">Enter this at signup to join the class</div>
          </div>
        </div>
        <div class="h-steps">
          <h3>Get started in 2 minutes</h3>
          <div class="step"><div class="step-n">1</div><p>Go to <strong>kidvibers.com</strong> on any device — phone, tablet, or computer</p></div>
          <div class="step"><div class="step-n">2</div><p>Tap <strong>"Start for Free"</strong> and create your child's account (takes 60 seconds)</p></div>
          <div class="step"><div class="step-n">3</div><p>Enter class code <strong>${CODE}</strong> to join this class</p></div>
          <div class="step"><div class="step-n">4</div><p><strong>Start coding!</strong> First lesson begins immediately 🚀</p></div>
        </div>
        <div class="h-features">
          <div class="feat"><div class="ico">📚</div><div class="ft">293 lessons</div><div class="fd">Across 25 worlds</div></div>
          <div class="feat"><div class="ico">🎮</div><div class="ft">Coding games</div><div class="fd">Earn tokens</div></div>
          <div class="feat"><div class="ico">🏆</div><div class="ft">Certificates</div><div class="fd">For every world</div></div>
          <div class="feat"><div class="ico">🤖</div><div class="ft">AI tutor</div><div class="fd">Ask anything (Pro)</div></div>
        </div>
        <div class="h-qr">
          <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https://kidvibers.com%3Fref%3D${encodeURIComponent(CODE)}" alt="QR code" />
          </div>
          <div class="qr-text">
            <h3>Scan to go straight there</h3>
            <p>Or type the address in any browser — works on any device, no app download needed.</p>
            <div class="url">kidvibers.com</div>
          </div>
        </div>
      </div>
      <div class="h-footer">
        <span>© 2026 KidVibers.com · Made by a kid, for kids ❤️ · Owner: Elisha Clark</span>
        <span>📧 <strong>support@kidvibers.com</strong> · 🛡️ Ad-free · Safe · COPPA-minded</span>
      </div>
    </div>`;

    // 3 cards per sheet
    const sheet = document.getElementById('sheet');
    sheet.innerHTML = card + card + card;
  </script>
</body>
</html>
