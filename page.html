          <h2>Reach us</h2>
          <ul>
            <li>📬 Email us anytime: <a href="mailto:kidvibers.help@outlook.com">kidvibers.help@outlook.com</a></li>
          </ul>

            <input id="cEmail" type="email" placeholder="Your email" required style="padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;" />
            <textarea id="cMsg" placeholder="How can we help?" required rows="4" style="padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;resize:vertical;"></textarea>

    const key = new URLSearchParams(location.search).get('p');
    const pg = PAGES[key] || { title: 'Page not found', lead: 'That page does not exist yet.', body: '<p><a href="index.html">← Back home</a></p>' };
    document.title = pg.title.replace(/^[^A-Za-z]+/, '') + ' — KidVibers';
    document.getElementById('pgTitle').textContent = pg.title;
    document.getElementById('pgLead').textContent = pg.lead;
