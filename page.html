      blog: {
        title: '✍️ The KidVibers Blog', lead: 'Tips, stories, and ideas for young coders and the grown-ups who cheer them on.',
        body: `
          <div style="background:linear-gradient(135deg,#2e1457,#4c1d95 60%,#6d28d9);border:1px solid var(--border-bright);border-radius:var(--radius);padding:28px;margin-bottom:28px;">
            <div style="font-size:0.78rem;font-weight:800;color:#c4b5fd;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">✨ Featured post · June 2026</div>
            <h2 style="font-size:1.4rem;font-weight:900;margin:0 0 10px;">I built a coding platform for kids — and I'm still in school</h2>
            <p style="color:#e6dcff;line-height:1.7;margin-bottom:14px;">My name is Elisha Clark. I built KidVibers because I wanted to learn to code, but everything I tried felt like homework. So I made something that felt like a game instead.</p>
            <p style="color:#e6dcff;line-height:1.7;margin-bottom:14px;">KidVibers has 242 lessons across 19 themed worlds. You earn XP, collect badges, beat boss battles at the end of each world, and build real Python projects in the playground. There's an AI buddy named Byte that gives hints without just giving you the answer. Everything is ad-free, safe for kids, and COPPA-minded.</p>
            <p style="color:#e6dcff;line-height:1.7;margin-bottom:14px;">I built the whole thing — the lessons, the backend, the accounts system, the gallery, the certificates, everything — and I host it on Cloudflare so it's always on. It's free to start. No credit card, no ads, ever.</p>
            <p style="color:#e6dcff;line-height:1.7;margin-bottom:18px;">If you're a parent, teacher, or a kid who wants to learn to code, try it out. I'd love to know what you think. You can email me at <a href="mailto:support@kidvibers.com" style="color:#a78bfa;font-weight:800;">support@kidvibers.com</a>.</p>
            <a href="index.html#signup" class="btn btn-primary">Try KidVibers free 🚀</a>
          </div>
          <h2>5 signs your kid is ready to code</h2>
          <p>From building elaborate LEGO machines to asking "how does this work?" — curiosity is the number one sign. Here's how to nurture it: give them something to <em>make</em>, not just watch. Coding on KidVibers means building real things — stories, games, calculators — not clicking through videos.</p>
          <h2>Why "boss battles" make learning stick</h2>
          <p>A little challenge at the end of each world turns review into a celebration. Research on mastery learning shows that a timed test after a unit dramatically improves long-term recall. On KidVibers, boss battles are the test — but they feel like the final level of a game, not an exam.</p>
          <h2>Screen time that actually teaches</h2>
          <p>Not all screen time is equal. Passive scrolling and active creating are completely different brain activities. When a kid writes a loop that prints their name 100 times, they're problem-solving, not consuming. That's the difference KidVibers is built on.</p>
          <p style="margin-top:14px;color:var(--text-faint);font-size:0.85rem;">More posts coming soon. Want a topic covered? <a href="mailto:support@kidvibers.com">Email us</a>.</p>`
      },

      help: {
        title: '💬 Help Center', lead: 'Quick answers to common questions.',
        body: `
          <h2>How do I create an account?</h2>
          <p>Tap <strong>Log In / Sign Up</strong> in the top corner, then choose <strong>Sign Up</strong>. Kids enter a first name, username, password, a parent's email, and their age.</p>
          <h2>Why can't my child play yet?</h2>
          <p>Every kid account needs a parent or guardian to <strong>approve it first</strong> - this applies to all kids. Until then it's "pending" and locked. A grown-up can approve by signing in with Google and confirming they're the parent, or by clicking the consent link we email and verifying they're an adult.</p>

          <p>Yes - parents and teachers can tap <strong>"Continue with Google"</strong> on the Log In / Sign Up box. It's for grown-ups (kids use a username and password), and Google shares only your name and email. When you sign up with Google, we'll ask for your child's details and your confirmation that you're the parent, then take you straight to the account.</p>

      careers: {

        body: `

      press: {
        title: '📰 Press', lead: 'News, brand assets, and media contact.',
        body: `
          <h2>About us (for media)</h2>
          <p>KidVibers.com is a Duolingo-style coding platform for kids ages 6-16, with <strong>242 lessons across 19 themed worlds</strong>, boss-battle assessments, an AI helper ("Byte"), certificates, and strong parental controls. Mandatory parental consent, ad-free, no data selling, and COPPA-minded. Founded and built by <strong>Elisha Clark</strong>.</p>

        title: '📬 Contact Us', lead: "We'd love to hear from you - questions, feedback, or just to say hi!",
        body: `
          <h2>Reach us</h2>
          <ul>
            <li>📬 Email: <a href="mailto:support@kidvibers.com">support@kidvibers.com</a></li>
            <li>💬 Chat with us on Slack: <a href="https://join.slack.com/t/kidviberscommunity/shared_invite/zt-42c5812o4-fYR6zj_0_sxYcGNvcdM~4w" target="_blank" rel="noopener" style="font-weight:800;color:var(--purple);">Join the KidVibers Community →</a></li>
          </ul>
          <h2>Send a message</h2>
          <form onsubmit="sendContact(event)" style="display:flex;flex-direction:column;gap:12px;max-width:460px;">
            <input id="cName" placeholder="Your name" required style="padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;" />
            <input id="cEmail" type="email" placeholder="Your email" required style="padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;" />
            <textarea id="cMsg" placeholder="How can we help?" required rows="4" style="padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;resize:vertical;"></textarea>
            <button type="submit" class="btn btn-primary" id="cBtn">Send message</button>
            <div id="cDone" style="font-weight:800;min-height:18px;"></div>
          </form>`
      }
    };

    async function sendContact(e) {
      e.preventDefault();
      const btn = document.getElementById('cBtn');
      const done = document.getElementById('cDone');
      btn.disabled = true; done.style.color = 'var(--text-dim)'; done.textContent = 'Sending…';
      const res = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('cName').value.trim(),
          email: document.getElementById('cEmail').value.trim(),
          message: document.getElementById('cMsg').value.trim(),
        }),
      });
      btn.disabled = false;
      if (res.ok) {
        done.style.color = 'var(--green, #22c55e)';
        done.textContent = "✅ Sent! We'll reply to " + document.getElementById('cEmail').value + " soon.";
        e.target.reset();
      } else {
        done.style.color = '#f87171';
        done.textContent = '❌ Could not send — try emailing support@kidvibers.com directly.';
      }
    }

    const key = new URLSearchParams(location.search).get('p');
    const pg = PAGES[key] || { title: 'Page not found', lead: 'That page does not exist yet.', body: '<p><a href="index.html">← Back home</a></p>' };
    document.title = pg.title.replace(/^[^A-Za-z]+/, '') + ' - KidVibers';
    document.getElementById('pgTitle').textContent = pg.title;
    document.getElementById('pgLead').textContent = pg.lead;
    document.getElementById('pgBody').innerHTML = pg.body;
  </script>
