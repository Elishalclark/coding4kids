# Fly.io config for Coding4Kids — deploys straight from this folder (no GitHub).
# If "coding4kids" is already taken, change the app name below to something unique
# (e.g. "coding4kids-ec") before deploying.
app = "coding4kids"
primary_region = "iad"   # Virginia. Change to a region near you if you like (e.g. "lax", "sea").

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"     # data.db + admin_config.json live on the persistent volume
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # keep 1 always running so the site is instantly available

# Persistent disk so accounts/projects survive deploys & restarts
[[mounts]]
  source = "c4k_data"
  destination = "/data"
