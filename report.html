<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Report - KidVibers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', Arial, sans-serif; background: #f3f4f6; color: #1e1040; padding: 20px; }
    .controls { max-width: 800px; margin: 0 auto 16px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn { background: #7c3aed; color: #fff; border: none; border-radius: 50px; padding: 10px 22px; font-weight: 900; font-size: 0.9rem; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; }
    .btn.ghost { background: #fff; color: #7c3aed; border: 1px solid #d8b4fe; }
    .sheet { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .r-head { background: linear-gradient(135deg, #2e1457, #4c1d95, #6d28d9); padding: 28px 32px; color: #fff; display: flex; align-items: center; gap: 16px; }
    .r-logo { font-size: 1.6rem; font-weight: 900; }
    .r-logo span { color: #c4b5fd; }
    .r-head .meta { margin-left: auto; text-align: right; font-size: 0.82rem; color: #d6c9ff; }
    .r-title { padding: 20px 32px 6px; }
    .r-title h1 { font-size: 1.5rem; font-weight: 900; }
    .r-title p { color: #6b7280; font-size: 0.9rem; margin-top: 3px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; padding: 10px 32px; border-bottom: 2px solid #ede9fe; }
    td { padding: 12px 32px; border-bottom: 1px solid #f3f0ff; font-size: 0.9rem; }
    td.name { font-weight: 800; }
    .bar { height: 8px; background: #ede9fe; border-radius: 50px; overflow: hidden; width: 120px; display: inline-block; vertical-align: middle; }
    .bar > div { height: 100%; background: linear-gradient(90deg,#7c3aed,#db2777); }
    .stat-row { display: flex; gap: 12px; padding: 12px 32px 20px; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 120px; background: #faf5ff; border: 1px solid #ede9fe; border-radius: 12px; padding: 14px 16px; text-align: center; }
    .stat .n { font-size: 1.6rem; font-weight: 900; color: #7c3aed; }
    .stat .l { font-size: 0.72rem; color: #6b7280; font-weight: 700; }
    .r-foot { padding: 16px 32px; background: #faf5ff; border-top: 1px solid #ede9fe; font-size: 0.78rem; color: #6b7280; text-align: center; }
    .empty { padding: 40px 32px; text-align: center; color: #9ca3af; }
    @media print {
      body { background: #fff; padding: 0; }
      .controls { display: none; }
      .sheet { box-shadow: none; max-width: 100%; border-radius: 0; }
    }
    @page { size: letter portrait; margin: 0.5in; }
  </style>
</head>
<body>
  <div class="controls">
    <a href="parent.html" class="btn ghost">← Back</a>
    <button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>

  <div class="sheet">
    <div class="r-head">
      <div class="r-logo">🚀 Kid<span>Vibers</span></div>
      <div class="meta" id="reportMeta"></div>
    </div>
    <div class="r-title">
      <h1 id="reportTitle">Progress Report</h1>
      <p id="reportSub">Loading…</p>
    </div>
    <div class="stat-row" id="statRow"></div>
    <table>
      <thead><tr><th>Student</th><th>Progress</th><th>Worlds</th><th>Avg Score</th><th>XP</th><th>Last Active</th></tr></thead>
      <tbody id="reportRows"></tbody>
    </table>
    <div class="r-foot">
      Generated by KidVibers.com · The fun way to learn coding · support@kidvibers.com
    </div>
  </div>

  <script src="auth.js?v=212"></script>
  <script>
    (async () => {
      const me = await C4K.loadMe();
      if (!me || (me.role !== 'teacher' && me.role !== 'parent' && me.role !== 'super_admin')) {
        location.href = 'index.html'; return;
      }
      const isTeacher = me.role === 'teacher';
      const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('reportMeta').innerHTML = `Generated<br><strong>${today}</strong>`;
      document.getElementById('reportTitle').textContent = isTeacher
        ? `${me.school || 'Classroom'} — Progress Report`
        : 'Family Progress Report';
      document.getElementById('reportSub').textContent = isTeacher
        ? `Teacher: ${me.name} · ${me.studentsUsed || 0} students`
        : `Parent: ${me.name}`;

      const { ok, data } = await C4K.api('/api/teacher/progress');
      const students = ok ? (data.students || []) : [];

      if (!students.length) {
        document.getElementById('reportRows').innerHTML = '<tr><td colspan="6" class="empty">No students yet.</td></tr>';
        return;
      }

      // Summary stats
      const totalLessons = students.reduce((s, x) => s + (x.lessonsDone || 0), 0);
      const totalWorlds = students.reduce((s, x) => s + (x.worldsCleared || 0), 0);
      const avgScore = Math.round(students.reduce((s, x) => s + (x.avgScore || 0), 0) / students.length);
      const active = students.filter(x => x.lastActive).length;
      document.getElementById('statRow').innerHTML = `
        <div class="stat"><div class="n">${students.length}</div><div class="l">Students</div></div>
        <div class="stat"><div class="n">${totalLessons}</div><div class="l">Lessons Done</div></div>
        <div class="stat"><div class="n">${totalWorlds}</div><div class="l">Worlds Cleared</div></div>
        <div class="stat"><div class="n">${avgScore}%</div><div class="l">Avg Score</div></div>
        <div class="stat"><div class="n">${active}</div><div class="l">Active</div></div>`;

      document.getElementById('reportRows').innerHTML = students.map(s => `
        <tr>
          <td class="name">${C4K.esc(s.name)}<br><span style="color:#9ca3af;font-size:0.75rem;font-weight:600;">@${C4K.esc(s.username)}</span></td>
          <td><span class="bar"><div style="width:${s.percent || 0}%"></div></span> <span style="font-size:0.8rem;color:#6b7280;">${s.lessonsDone}/${s.totalLessons}</span></td>
          <td>${s.worldsCleared} 🏆</td>
          <td>${s.avgScore ? s.avgScore + '%' : '—'}</td>
          <td>${s.xp} ⚡</td>
          <td style="color:#6b7280;">${s.lastActive || 'never'}</td>
        </tr>`).join('');
    })();
  </script>
</body>
</html>
