<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - KidVibers</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=53" />
  <style>
    .st { max-width: 640px; margin: 0 auto; padding: 24px 18px 90px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:18px; }
    .card h2 { font-size:1.1rem; font-weight:900; margin-bottom:6px; }
    .card .hint { color:var(--text-dim); font-size:0.86rem; margin-bottom:16px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:0.78rem; font-weight:800; color:var(--text-dim); margin-bottom:5px; }
    .field input { width:100%; box-sizing:border-box; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:inherit; font-weight:700; }
    .field input:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { font-size:0.85rem; font-weight:700; min-height:18px; margin-top:8px; }
    .kid-row { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; border-top:1px solid var(--border); padding-top:14px; margin-top:14px; }
    .kid-row .field { flex:1; min-width:140px; margin:0; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🚀</span><span>Kid<strong>Vibers</strong></span></a>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <a href="#" class="btn btn-ghost" id="homeLink">Dashboard</a>
        <button class="btn btn-outline" id="logoutBtn" onclick="C4K.logout().then(()=>location.href='index.html')">Log out</button>
      </div>
    </div>
  </nav>

  <main class="st" id="stMain" style="display:none;">
    <h1 style="font-size:1.5rem;font-weight:900;margin:8px 0 20px;">⚙️ Settings</h1>

    <!-- Your account -->
    <div class="card">
      <h2 id="acctTitle">Your account</h2>
      <p class="hint" id="acctHint">Update your username or email.</p>
      <div class="field"><label>Name</label><input id="meName" disabled /></div>
      <div class="field"><label>Username</label><input id="meUser" /></div>
      <div class="field"><label>Email</label><input id="meEmail" type="email" /></div>
      <button class="btn btn-primary" id="meSaveBtn" onclick="saveMe()">Save changes</button>
      <div class="msg" id="meMsg"></div>
    </div>

    <!-- Kids (parents/teachers) -->
    <div class="card" id="kidsCard" style="display:none;">
      <h2>👧 Your kids</h2>
      <p class="hint">As the parent/guardian, you can change your kids' username or email here.</p>
      <div id="kidsList"></div>
    </div>
  </main>

  <div class="st" id="stGate" style="display:none;text-align:center;padding-top:80px;">
    <div style="font-size:3rem;">🔒</div>
    <h1 style="font-size:1.3rem;font-weight:900;margin:10px 0;">Please log in</h1>
    <a href="index.html?login=1" class="btn btn-primary">Go to log in</a>
  </div>

  <script src="auth.js?v=53"></script>
  <script>
    let ME = null;
    (async () => {
      ME = await C4K.loadMe();
      if (!ME) { document.getElementById('stGate').style.display = ''; return; }
      document.getElementById('stMain').style.display = '';
      document.getElementById('homeLink').href = C4K.homeFor(ME);
      // Kids can't log themselves out — only a parent/guardian can.
      if (ME.role === 'kid') document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('meName').value = ME.name || '';
      document.getElementById('meUser').value = ME.username || '';
      document.getElementById('meEmail').value = ME.parentEmail || '';

      const isKid = ME.role === 'kid';
      if (isKid) {
        // Kids can't change their own - a parent must.
        document.getElementById('acctHint').textContent = 'Ask a parent or guardian to change your username or email for you.';
        document.getElementById('meUser').disabled = true;
        document.getElementById('meEmail').disabled = true;
        document.getElementById('meSaveBtn').style.display = 'none';
      }
      if (ME.role === 'parent' || ME.role === 'teacher') loadKids();
    })();

    async function saveMe() {
      const msg = document.getElementById('meMsg');
      msg.style.color = 'var(--text-dim)'; msg.textContent = 'Saving…';
      const body = { username: document.getElementById('meUser').value.trim(), email: document.getElementById('meEmail').value.trim() };
      const { ok, data } = await C4K.api('/api/account/update', 'POST', body);
      if (ok) { msg.style.color = 'var(--green,#5ad17e)'; msg.textContent = '✅ Saved: ' + (data.changed || []).join(' & '); }
      else { msg.style.color = '#f87171'; msg.textContent = (data && data.error) || 'Could not save.'; }
    }

    async function loadKids() {
      const { ok, data } = await C4K.api('/api/parent/family');
      if (!ok) return;
      const kids = data.kids || [];
      if (!kids.length) return;
      document.getElementById('kidsCard').style.display = '';
      document.getElementById('kidsList').innerHTML = kids.map(k =>
        `<div class="kid-row">
           <div class="field"><label>${C4K.esc(k.name)} - username</label><input id="ku_${k.id}" value="${C4K.esc(k.username)}" /></div>
           <div class="field"><label>Parent email</label><input id="ke_${k.id}" type="email" value="${C4K.esc(k.parentEmail || '')}" /></div>
           <button class="btn btn-primary" onclick="saveKid(${k.id})">Save</button>
           <div class="msg" id="km_${k.id}" style="flex-basis:100%;"></div>
         </div>`).join('');
    }
    async function saveKid(id) {
      const msg = document.getElementById('km_' + id);
      msg.style.color = 'var(--text-dim)'; msg.textContent = 'Saving…';
      const body = { kidId: id, username: document.getElementById('ku_' + id).value.trim(), email: document.getElementById('ke_' + id).value.trim() };
      const { ok, data } = await C4K.api('/api/parent/update-kid', 'POST', body);
      if (ok) { msg.style.color = 'var(--green,#5ad17e)'; msg.textContent = '✅ Saved: ' + (data.changed || []).join(' & '); }
      else { msg.style.color = '#f87171'; msg.textContent = (data && data.error) || 'Could not save.'; }
    }
  </script>
  <script src="pwa.js?v=53" defer></script>
  <script src="editor.js?v=53" defer></script>
</body>
</html>
