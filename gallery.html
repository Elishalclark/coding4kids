<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="canonical" href="https://kidvibers.com/gallery.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Gallery - KidVibers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=76" />
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <style>
    .gal { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
    .gal-head { display:flex; align-items:center; gap:14px; margin:10px 0 6px; flex-wrap:wrap; }
    .gal-head h1 { font-size:1.6rem; font-weight:900; }
    .gal-head p { color:var(--text-dim); font-size:0.95rem; }
    .gal-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-top:20px; }
    .proj { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; }
    .proj-top { padding:14px 16px 10px; }
    .proj-top h3 { font-size:1.02rem; font-weight:900; word-break:break-word; }
    .proj-top .by { font-size:0.78rem; color:var(--text-faint); margin-top:3px; }
    .proj pre.code { margin:0; background:#06040f; color:#d6e7ff; font-family:'SFMono-Regular',Consolas,monospace; font-size:0.82rem; line-height:1.5; padding:12px 16px; max-height:150px; overflow:auto; white-space:pre-wrap; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .proj-out { margin:0; background:#02030a; color:#9be7a0; font-family:'SFMono-Regular',Consolas,monospace; font-size:0.8rem; line-height:1.5; padding:0 16px; max-height:0; overflow:auto; transition:max-height .2s, padding .2s; white-space:pre-wrap; }
    .proj-out.show { max-height:160px; padding:12px 16px; }
    .proj-out .err { color:#f87171; }
    .proj-actions { display:flex; gap:8px; align-items:center; padding:11px 16px; flex-wrap:wrap; }
    .like-btn { font-size:0.82rem; font-weight:900; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); padding:6px 12px; border-radius:50px; cursor:pointer; }
    .like-btn.liked { color:#ff6b9d; border-color:#ff6b9d55; }
    .gbtn { font-size:0.78rem; font-weight:800; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); padding:6px 12px; border-radius:8px; cursor:pointer; text-decoration:none; }
    .gbtn:hover { color:var(--purple); border-color:var(--border-bright); }
    .gbtn.danger:hover { color:#f87171; border-color:#f8717155; }
    .empty { text-align:center; color:var(--text-dim); padding:60px 20px; }
    .empty .big { font-size:3rem; }
    /* comments */
    .cm-wrap { border-top:1px solid var(--border); padding:12px 16px; display:none; }
    .cm-wrap.show { display:block; }
    .cm-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
    .cm { background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 11px; font-size:0.85rem; }
    .cm.reported { border-color:#f8717155; }
    .cm .cm-head { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
    .cm .cm-author { font-weight:900; font-size:0.78rem; }
    .cm .cm-at { font-size:0.68rem; color:var(--text-faint); }
    .cm .cm-flag { font-size:0.66rem; font-weight:900; color:#f87171; }
    .cm .cm-body { word-break:break-word; white-space:pre-wrap; line-height:1.45; }
    .cm .cm-tools { display:flex; gap:10px; margin-top:5px; }
    .cm .cm-tools button { background:none; border:none; color:var(--text-faint); font-size:0.72rem; font-weight:800; cursor:pointer; padding:0; }
    .cm .cm-tools button:hover { color:var(--purple); }
    .cm .cm-tools button.rm:hover { color:#f87171; }
    .cm-form { display:flex; gap:8px; }
    .cm-form input { flex:1; background:#06040f; border:1px solid var(--border); color:var(--text); border-radius:50px; padding:8px 14px; font-family:inherit; font-size:0.85rem; }
    .cm-form button { font-size:0.8rem; font-weight:800; }
    .cm-rules { font-size:0.7rem; color:var(--text-faint); margin-top:7px; }
    .cm-rules a { color:var(--text-dim); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🚀</span><span>Kid<strong>Vibers</strong></span></a>
      <div style="margin-left:auto;display:flex;gap:12px;align-items:center;">
        <a href="playground.html" class="btn btn-outline">🛝 Playground</a>
        <a href="lessons.html" class="btn btn-outline">📚 Lessons</a>
        <a href="dashboard.html" class="btn btn-ghost" id="dashLink" style="display:none;">📊 Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="gal">
    <div class="gal-head">
      <span style="font-size:2rem;">🎨</span>
      <div><h1>Project Gallery</h1><p>Cool things other kids built. Run them, like your favorites, and remix them in the Playground!</p></div>
    </div>
    <div id="toolbar" style="display:none;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0 4px;">
      <input id="search" type="text" placeholder="🔎 Search projects or makers…" oninput="applyFilter()"
        style="flex:1;min-width:200px;background:#06040f;border:1px solid var(--border);color:var(--text);border-radius:50px;padding:9px 16px;font-family:inherit;font-weight:700;" />
      <select id="sort" onchange="applyFilter()"
        style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 12px;font-weight:800;font-family:inherit;">
        <option value="loved">❤️ Most loved</option>
        <option value="newest">🆕 Newest</option>
        <option value="title">🔤 A-Z</option>
      </select>
      <span id="count" style="color:var(--text-faint);font-size:0.85rem;font-weight:700;"></span>
    </div>
    <div id="content"><p style="color:var(--text-faint);">Loading projects…</p></div>
  </main>

  <script src="auth.js?v=76"></script>
  <script>
    const $ = id => document.getElementById(id);
    let canModerate = false;

    function builtinRead(x) {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined)
        throw "File not found: '" + x + "'";
      return Sk.builtinFiles['files'][x];
    }

    function runProject(code, outEl, btn) {
      if (typeof Sk === 'undefined') { outEl.classList.add('show'); outEl.textContent = 'Python engine still loading…'; return; }
      outEl.classList.add('show'); outEl.textContent = 'Running…';
      let buf = '';
      btn.disabled = true;
      Sk.configure({
        output: t => { buf += t; },
        read: builtinRead,
        __future__: Sk.python3,
        inputfun: p => window.prompt(p || '') || '',
        inputfunTakesPrompt: true,
      });
      Sk.misceval.asyncToPromise(() => Sk.importMainWithBody('<stdin>', false, code, true))
        .then(() => { outEl.innerHTML = C4K.esc(buf || '✅ Done! (no output)'); btn.disabled = false; },
              e => { outEl.innerHTML = (buf ? C4K.esc(buf) + '\n' : '') + '<span class="err">⚠️ ' + C4K.esc(e.toString()) + '</span>'; btn.disabled = false; });
    }

    async function like(id, btn) {
      const { ok, data } = await C4K.api('/api/projects/like', 'POST', { id });
      if (ok) {
        btn.classList.toggle('liked', data.liked);
        btn.textContent = (data.liked ? '❤️ ' : '🤍 ') + data.likes;
      }
    }

    async function remove(id, title, card) {
      if (!confirm('Remove “' + title + '” from the gallery? (moderation)')) return;
      const { ok } = await C4K.api('/api/projects/delete', 'POST', { id });
      if (ok) card.remove();
    }

    async function requestTakedown(id, title, btn) {
      const reason = prompt('Ask an admin to review and take down “' + title + '”.\n\nWhy should it be removed? (optional)');
      if (reason === null) return;  // cancelled
      const { ok, data } = await C4K.api('/api/projects/takedown', 'POST', { projectId: id, reason });
      if (ok) { btn.textContent = data.already ? '✓ Already requested' : '✓ Sent to admin'; btn.disabled = true; }
      else alert(data.error || 'Could not send the request.');
    }

    async function loadComments(pid, listEl) {
      const { ok, data } = await C4K.api('/api/comments/' + pid);
      if (!ok) { listEl.innerHTML = '<p style="color:var(--text-faint);font-size:0.8rem;">Could not load comments.</p>'; return; }
      renderComments(pid, data.comments, listEl);
    }

    function renderComments(pid, comments, listEl) {
      listEl.innerHTML = '';
      if (!comments.length) {
        listEl.innerHTML = '<p style="color:var(--text-faint);font-size:0.8rem;">No comments yet - be the first to say something nice!</p>';
        return;
      }
      comments.forEach(c => {
        const el = document.createElement('div');
        el.className = 'cm' + (c.reported ? ' reported' : '');
        el.innerHTML = `
          <div class="cm-head">
            <span class="cm-author">${C4K.esc(c.author || 'a coder')}</span>
            <span class="cm-at">${C4K.esc(c.at)}</span>
            ${c.reported ? '<span class="cm-flag">⚑ reported</span>' : ''}
          </div>
          <div class="cm-body">${C4K.esc(c.body)}</div>
          <div class="cm-tools">
            ${c.canDelete ? '<button class="rm" data-act="del">🗑️ Remove</button>' : '<button data-act="rep">⚑ Report</button>'}
          </div>`;
        const del = el.querySelector('[data-act=del]');
        if (del) del.onclick = async () => {
          if (!confirm('Remove this comment?')) return;
          const { ok } = await C4K.api('/api/comments/delete', 'POST', { id: c.id });
          if (ok) loadComments(pid, listEl);
        };
        const rep = el.querySelector('[data-act=rep]');
        if (rep) rep.onclick = async () => {
          const { ok } = await C4K.api('/api/comments/report', 'POST', { id: c.id });
          if (ok) { rep.textContent = '✓ Reported'; rep.disabled = true; }
        };
        listEl.appendChild(el);
      });
    }

    async function addComment(pid, inp, listEl) {
      const body = inp.value.trim();
      if (!body) return;
      const { ok, data } = await C4K.api('/api/comments/add', 'POST', { projectId: pid, body });
      if (ok) { inp.value = ''; loadComments(pid, listEl); }
      else alert(data.error || 'Could not post comment.');
    }

    function render(projects) {
      const c = $('content');
      if (!projects.length) {
        c.innerHTML = `<div class="empty"><div class="big">🎨</div>
          <h2 style="font-weight:900;margin:10px 0 6px;">No shared projects yet!</h2>
          <p>Be the first - build something in the <a href="playground.html" style="color:var(--purple);font-weight:800;">Playground</a> and tick “Share to gallery”.</p></div>`;
        return;
      }
      const grid = document.createElement('div'); grid.className = 'gal-grid';
      projects.forEach(p => {
        const card = document.createElement('div'); card.className = 'proj';
        card.innerHTML = `
          <div class="proj-top">
            <h3>${C4K.esc(p.title)}</h3>
            <div class="by">by ${C4K.esc(p.author || 'a coder')} · ${C4K.esc(p.updatedAt)}</div>
          </div>
          <pre class="code">${C4K.esc(p.code)}</pre>
          <pre class="proj-out"></pre>
          <div class="proj-actions">
            <button class="like-btn ${p.liked ? 'liked' : ''}">${p.liked ? '❤️ ' : '🤍 '}${p.likes}</button>
            <button class="gbtn" data-act="run">▶ Run</button>
            <button class="gbtn" data-act="cm">💬 Comments</button>
            <a class="gbtn" href="playground.html?project=${p.id}">✏️ Remix</a>
            <button class="gbtn" data-act="td" title="Ask an admin to review and remove this project">🛑 Request takedown</button>
            ${canModerate ? '<button class="gbtn danger" data-act="rm">🗑️ Remove</button>' : ''}
          </div>
          <div class="cm-wrap">
            <div class="cm-list"></div>
            <form class="cm-form">
              <input type="text" maxlength="500" placeholder="Add a kind comment…" />
              <button class="btn btn-primary" type="submit">Post</button>
            </form>
            <div class="cm-rules">Be kind! Mean or rude comments are removed and can get an account suspended. <a href="terms.html" target="_blank">Community rules</a></div>
          </div>`;
        const outEl = card.querySelector('.proj-out');
        card.querySelector('.like-btn').onclick = e => like(p.id, e.currentTarget);
        card.querySelector('[data-act=run]').onclick = e => runProject(p.code, outEl, e.currentTarget);
        card.querySelector('[data-act=td]').onclick = e => requestTakedown(p.id, p.title, e.currentTarget);
        const cmWrap = card.querySelector('.cm-wrap');
        let loaded = false;
        card.querySelector('[data-act=cm]').onclick = () => {
          cmWrap.classList.toggle('show');
          if (cmWrap.classList.contains('show') && !loaded) { loaded = true; loadComments(p.id, cmWrap.querySelector('.cm-list')); }
        };
        card.querySelector('.cm-form').onsubmit = async e => {
          e.preventDefault();
          const inp = e.target.querySelector('input');
          await addComment(p.id, inp, cmWrap.querySelector('.cm-list'));
        };
        if (canModerate) card.querySelector('[data-act=rm]').onclick = () => remove(p.id, p.title, card);
        grid.appendChild(card);
      });
      c.innerHTML = ''; c.appendChild(grid);
    }

    (async () => {
      const me = await C4K.loadMe();
      // Gallery requires an account - show the friendly sign-in gate.
      if (C4K.loginGate('the Gallery')) return;
      // COPPA: lock the gallery for under-13 kids until a parent approves.
      if (C4K.consentLock(me)) return;
      if (me.role === 'kid') $('dashLink').style.display = '';
      const { ok, data } = await C4K.api('/api/gallery');
      if (!ok) { $('content').innerHTML = '<p style="color:#f87171;">Could not load the gallery.</p>'; return; }
      canModerate = !!data.canModerate;
      ALL_PROJECTS = data.projects || [];
      if (ALL_PROJECTS.length) $('toolbar').style.display = 'flex';
      applyFilter();
    })();

    let ALL_PROJECTS = [];
    function applyFilter() {
      const q = ($('search').value || '').trim().toLowerCase();
      const sort = $('sort').value;
      let list = ALL_PROJECTS.filter(p =>
        !q || (p.title || '').toLowerCase().includes(q) || (p.author || '').toLowerCase().includes(q));
      if (sort === 'newest') list = [...list].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      else if (sort === 'title') list = [...list].sort((a, b) => (a.title || '').localeCompare(b.title || ''));
      else list = [...list].sort((a, b) => (b.likes || 0) - (a.likes || 0));
      const c = $('count');
      if (c) c.textContent = q ? `${list.length} match${list.length === 1 ? '' : 'es'}` : `${ALL_PROJECTS.length} project${ALL_PROJECTS.length === 1 ? '' : 's'}`;
      render(list);
    }
  </script>
  <script src="editor.js?v=76" defer></script>
</body>
</html>
